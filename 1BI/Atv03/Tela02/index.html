<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout 2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">Logo</div>
      <nav>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">5</a>
      </nav>
      <div class="header-acoes">
        <a href="#" class="btn-link">Entrar</a>
        <button class="btn-outline">Botão Secundário</button>
        <button class="btn-solid">Botão Principal</button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-texto">
          <div class="titulo-principal">Título Grande</div>
          <p class="descricao">
            Texto descritivo: Lorem ipsum dolor sit amet, consectetur adipiscing
            elit. Sed do eiusmod tempor incididunt ut labore et dolore magna
            aliqua. Lorem ipsum dolor sit amet consectetur adipiscing.
          </p>
          <div class="hero-botoes">
            <button class="btn-solid">Botão Principal</button>
            <button class="btn-outline">Botão Secundário</button>
          </div>
        </div>
        <div class="hero-imagem">
          <div class="img-slot topo">
            <img
              src="https://picsum.photos/200/120?random=1"
              alt="Imagem Genérica"
            />
          </div>
          <div class="separador"></div>
          <div class="img-slot meio">
            <img
              src="https://picsum.photos/200/200?random=2"
              alt="Imagem Genérica"
            />
          </div>
          <div class="separador"></div>
          <div class="img-slot baixo">
            <img
              src="https://picsum.photos/200/120?random=3"
              alt="Imagem Genérica"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
